services:
  backend:
    build:
      context: ./backend
    container_name: casagranum-backend
    env_file: .env
    # Permite FB_HOST=host.docker.internal sem depender do Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - casagranum_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8000}
    container_name: casagranum-frontend
    env_file: .env
    environment:
      PORT: ${FRONTEND_PORT:-8080}
    ports:
      - "${FRONTEND_PORT:-8080}:${FRONTEND_PORT:-8080}"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: casagranum-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - frontend
      - backend
    profiles: ["tunnel"]

volumes:
  casagranum_data:
    name: casagranum_data
